version: 2

models:
  - name: fct_order_items
    description: "One row per item sold in an order, including revenue and profit."
    columns:
      - name: order_item_id
        description: "Primary key for the order item."
        tests:
          - unique
          - not_null
      - name: revenue
        description: "The price the item was sold for."
        tests:
          - not_null